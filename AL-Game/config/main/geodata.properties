# ==========================================
# Geodata config's:
# ==========================================

# Enable Geodata (heights and meshes)
# Default: true
gameserver.geodata.enable = true

# Enable loading and use of Navigational data (pathfinding)
# Default: false
gameserver.geo.nav.pathfinding.enable = false

# Enable canSee checks using geodata.
# Default: true
gameserver.geodata.cansee.enable = true

# Enable fear skill using geodata.
# Default: true
gameserver.geodata.fear.enable = true

# If enabled - during movements npcs will be checking z coordinate based on geo if target is flying
# Default: true
gameserver.geo.npc.move = true

# Enable npc checks aggro target visibility range (canSee)
# Default: true
gameserver.geo.npc.aggro = true

# Enable geo materials using skills
# Default: false
gameserver.geo.materials.enable = true

# Show collision zone name and skill id for GMs
# Default: false
gameserver.geo.materials.showdetails = false

# Enable geodata shields, for test purpose
# Default: false
gameserver.geo.shields.enable = false

# Enable geodata doors, for test purpose
# Default: false
gameserver.geo.doors.enable = false

# Enable object factory for geo primitives
# Default: true
gameserver.geodata.objectfactory.enabled = true

#If you use monon2 geo data for your server
# Default: if false server will use just normal geodata
gameserver.geodata.monon2.in.use = true

# ============================================
# NAVIGATION SYSTEM (PATHFINDING)
# ============================================

# Master switch for navigation/pathfinding system
# If false, all navigation features are disabled and no nav files are loaded
# Default: false
gameserver.geo.nav.pathfinding.enable = false

# Enable on-demand lazy loading of navigation meshes
# If true, nav files are loaded only when first accessed (recommended)
# If false, all nav files are preloaded at startup (slow, memory heavy)
# Default: true
gameserver.geo.nav.lazy.load = true

# Use SoftReference cache for navigation meshes
# When true, nav meshes can be garbage collected under memory pressure
# Useful for long-running servers with many maps
# Default: false
gameserver.geo.nav.soft.cache = false

# Maximum number of navigation meshes to keep in strong cache
# 0 = unlimited (not recommended)
# Used only when soft.cache = false
# Default: 50
gameserver.geo.nav.cache.size = 50

# Log level for navigation system
# 0 = errors only, 1 = info, 2 = debug
# Default: 1
gameserver.geo.nav.log.level = 1

# Enable pull/path validation checks
# Controls whether canPullTarget uses navmesh validation
# Default: true
gameserver.geo.nav.pull.enable = true

# ============================================
# PATHFINDING ALGORITHM PARAMETERS
# ============================================

# Maximum number of nodes to process during pathfinding
# Prevents infinite loops and excessive CPU usage
# Default: 800
gameserver.geo.nav.max.nodes = 800

# Distance threshold for considering target as "reached"
# If target is not on navmesh, pathfinding stops when estimated distance is below this value
# Default: 5 (meters)
gameserver.geo.nav.target.threshold = 5

# Path weight penalty for moving away from target
# Higher values make NPCs prefer direct paths
# Range: 0.0 - 1.0, Default: 0.2
gameserver.geo.nav.path.weight = 0.2

# Target distance weight in A* heuristic
# Higher values make NPCs prioritize moving toward target
# Default: 20.0
gameserver.geo.nav.target.weight = 20

# ============================================
# GROUND DETECTION PARAMETERS
# ============================================

# Maximum distance to search for ground/navmesh below entity
# Default: 5 (meters)
gameserver.geo.nav.ground.search.distance = 5

# Box half-extent in XY plane for fallback ground detection
# Default: 0.8 (meters)
gameserver.geo.nav.box.extent.xy = 0.8

# Box Z offset below entity for fallback ground detection
# Default: -1 (meters)
gameserver.geo.nav.box.offset.z.min = -1

# Box Z offset above entity for fallback ground detection
# Default: 4 (meters)
gameserver.geo.nav.box.offset.z.max = 4

# Box center Z offset for fallback ground detection
# Default: 0.2 (meters)
gameserver.geo.nav.box.center.z = 0.2

# ============================================
# PATHFINDING OPTIMIZATION
# ============================================

# Enable path smoothing using string pulling algorithm
# Default: true
gameserver.geo.nav.smooth.path = true

# Maximum corridor length for path smoothing
# Prevents stack overflow on extremely long paths
# Default: 800
gameserver.geo.nav.corridor.length = 800

# Enable caching of ground detection results
# Improves performance for stationary entities
# Default: true
gameserver.geo.nav.cache.ground = true

# Time-to-live for ground cache entries (milliseconds)
# Default: 1000 (1 second)
gameserver.geo.nav.cache.ttl = 1000

# Use SoftReference cache for navigation meshes
# When true, nav meshes can be garbage collected under memory pressure
# Useful for long-running servers with many maps
# Default: false
gameserver.geo.nav.soft.cache = false